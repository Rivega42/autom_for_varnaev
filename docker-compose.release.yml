# Релизный compose для развёртывания У ЗАКАЗЧИКА (Plan B).
#
# Отличие от docker-compose.yml: НАШИ сервисы не собираются из исходников
# (`build:`), а ТЯНУТСЯ готовыми закрытыми образами из реестра (`image:`).
# Первый запуск — без долгой сборки: `docker compose -f docker-compose.release.yml pull`
# и `... up -d`. Полная инструкция — docs/DEPLOY_CUSTOMER.md.
#
# Образы наших сервисов публикуются скриптом scripts/publish_release_images.sh
# (или .ps1) в реестр REGISTRY с тегом IMAGE_TAG (по умолчанию ghcr.io/rivega42,
# тег v1.0.0). api-gateway и video-analytics — ЗАКРЫТЫЕ сборки (Nuitka, distroless).
#
# Сторонние образы (db/mqtt/grafana/go2rtc) тянутся из публичных реестров как есть.
# Конфиги объекта (go2rtc.yaml камер, дашборды, init БД, модель MediaPipe) остаются
# монтируемыми с диска — они специфичны для объекта и в образы не зашиваются.
#
# Переменные REGISTRY и IMAGE_TAG задаются в .env (см. .env.example).

# Фиксируем имя проекта: тома называются varnaev_* независимо от имени папки.
# Важно для восстановления снимка БД (db_snapshot/restore_db.* → том varnaev_db_data).
name: varnaev

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      POSTGRES_RO_USER: ${POSTGRES_RO_USER:-grafana_ro}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD:?POSTGRES_RO_PASSWORD должен быть задан в .env}
    networks:
      - internal
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitoring} -d ${POSTGRES_DB:-monitoring}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  migrate:
    # Применение миграций Alembic (one-shot) ДО старта прикладных сервисов.
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-migrate:${IMAGE_TAG:-v1.0.0}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      READINGS_COMPRESS_AFTER_DAYS: ${READINGS_COMPRESS_AFTER_DAYS:-7}
      READINGS_RETENTION_DAYS: ${READINGS_RETENTION_DAYS:-0}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  artifacts-init:
    # Выравнивание прав общего тома артефактов (#380): том Docker инициализирует
    # как root:root, а video-analytics/api-gateway пишут под appuser (uid 10001).
    # One-shot (как migrate) выставляет владельца тома 10001:10001 ДО старта
    # сервисов — декларативно и переживает пересоздание тома. Образ busybox —
    # сторонний, тянется/грузится вместе с остальными (см. build_offline_bundle).
    image: busybox:1.36
    user: "0:0"  # root: только для chown смонтированного тома
    network_mode: "none"
    command:
      - sh
      - -c
      - mkdir -p /data/artifacts && chown -R 10001:10001 /data/artifacts && chmod -R u+rwX /data/artifacts
    volumes:
      - artifacts:/data/artifacts
    restart: "no"

  mqtt-broker:
    image: eclipse-mosquitto:2
    networks:
      - internal
      - edge
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
    restart: unless-stopped

  media-gateway:
    image: alexxit/go2rtc:latest
    networks:
      - internal
      - edge
    volumes:
      - ./media-gateway/go2rtc.yaml:/config/go2rtc.yaml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD должен быть задан в .env}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_RO_USER: ${POSTGRES_RO_USER:-grafana_ro}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD:?POSTGRES_RO_PASSWORD должен быть задан в .env}
    networks:
      - internal
      - edge
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  log-service:
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-log-service:${IMAGE_TAG:-v1.0.0}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      NOTIFY_MIN_SEVERITY: ${NOTIFY_MIN_SEVERITY:-warning}
      NOTIFY_TYPES: ${NOTIFY_TYPES:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      NOTIFY_EMAIL_FROM: ${NOTIFY_EMAIL_FROM:-}
      NOTIFY_EMAIL_TO: ${NOTIFY_EMAIL_TO:-}
      NOTIFY_ESCALATE_AFTER_MIN: ${NOTIFY_ESCALATE_AFTER_MIN:-0}
      NOTIFY_ESCALATE_REPEAT_MIN: ${NOTIFY_ESCALATE_REPEAT_MIN:-30}
      NOTIFY_ESCALATE_MAX: ${NOTIFY_ESCALATE_MAX:-3}
      NOTIFY_ESCALATE_SEVERITIES: ${NOTIFY_ESCALATE_SEVERITIES:-critical}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
      - edge
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api-gateway:
    # ЗАКРЫТАЯ сборка (Nuitka, distroless): нет .py нашей логики и нет шелла.
    # Поэтому healthcheck НЕ задаётся (в образе нет python/shell для проверки).
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-api-gateway:${IMAGE_TAG:-v1.0.0}
    environment:
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      API_KEY: ${API_KEY:?API_KEY должен быть задан в .env (иначе API открыт без ключа)}
      API_KEYS: ${API_KEYS:-}
      LICENSE_KEY: ${LICENSE_KEY:-}
      AURA_INTEGRATION_ENABLED: ${AURA_INTEGRATION_ENABLED:-false}
      GO2RTC_URL: ${GO2RTC_URL:-http://media-gateway:1984}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
    networks:
      - internal
      - integration
      - edge
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        condition: service_healthy
      artifacts-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ingest-sensors:
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-ingest-sensors:${IMAGE_TAG:-v1.0.0}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      MQTT_HOST: ${MQTT_HOST:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-monitoring}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      SENSOR_SILENT_MIN: ${SENSOR_SILENT_MIN:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mqtt-broker:
        condition: service_started
    restart: unless-stopped

  scheduler:
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-scheduler:${IMAGE_TAG:-v1.0.0}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      SCHEDULER_CONFIG: ${SCHEDULER_CONFIG:-/config/schedules.json}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      GO2RTC_URL: ${GO2RTC_URL:-http://media-gateway:1984}
      CAMERA_PROBE_TIMEOUT_S: ${CAMERA_PROBE_TIMEOUT_S:-8}
      SCHEDULER_TICK_S: ${SCHEDULER_TICK_S:-60}
      SERVICE_SILENT_MIN: ${SERVICE_SILENT_MIN:-5}
      PRESENCE_TZ: ${PRESENCE_TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    volumes:
      - ./config:/config:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        condition: service_healthy
    restart: unless-stopped

  video-analytics:
    # ЗАКРЫТАЯ сборка (Nuitka). Модель MediaPipe монтируется с диска (бинарный
    # ассет объекта, в образ не зашивается) — без неё воркер не стартует.
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-video-analytics:${IMAGE_TAG:-v1.0.0}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
      ANALYTICS_FPS: ${ANALYTICS_FPS:-5}
      ANALYTICS_MODEL_PATH: ${ANALYTICS_MODEL_PATH:-/models/pose_landmarker.task}
      ANALYTICS_MAX_STREAM_FRAMES: ${ANALYTICS_MAX_STREAM_FRAMES:-150}
      ANALYTICS_UNIFORM_MIN_S: ${ANALYTICS_UNIFORM_MIN_S:-5}
      ARTIFACTS_RETENTION_DAYS: ${ARTIFACTS_RETENTION_DAYS:-30}
      AURA_CALLBACK_TIMEOUT_S: ${AURA_CALLBACK_TIMEOUT_S:-5}
      AURA_CALLBACK_RETRIES: ${AURA_CALLBACK_RETRIES:-2}
      AURA_CALLBACK_ALLOWED_HOSTS: ${AURA_CALLBACK_ALLOWED_HOSTS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    volumes:
      - artifacts:/data/artifacts
      - ./models:/models:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        condition: service_healthy
      media-gateway:
        condition: service_started
      artifacts-init:
        condition: service_completed_successfully
    restart: unless-stopped

  backup:
    # Резервное копирование БД по расписанию с ротацией (#267).
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-backup:${IMAGE_TAG:-v1.0.0}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      BACKUP_DIR: /backups
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
      BACKUP_INTERVAL_H: ${BACKUP_INTERVAL_H:-24}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Сидинг справочников объекта из YAML (one-shot, ТОЛЬКО под профилем seed).
  # docker compose -f docker-compose.release.yml --profile seed run --rm seed --apply
  seed:
    profiles: ["seed"]
    image: ${REGISTRY:-ghcr.io/rivega42}/varnaev-seed:${IMAGE_TAG:-v1.0.0}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
    networks:
      - internal
    volumes:
      - ./db/seeds:/seeds:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # Инструмент прошивки узлов датчиков (ESPHome Dashboard) — по требованию.
  # docker compose -f docker-compose.release.yml --profile tools up -d esphome
  esphome:
    profiles: ["tools"]
    image: ghcr.io/esphome/esphome:${ESPHOME_VERSION:-latest}
    environment:
      ESPHOME_DASHBOARD_USE_PING: "true"
    volumes:
      - ./firmware/esphome:/config
      - esphome_cache:/cache
      - esphome_build:/build
    ports:
      - "6052:6052"
    networks:
      - edge
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: true
  edge:
    driver: bridge
  integration:
    driver: bridge

volumes:
  artifacts:
  db_data:
  mqtt_data:
  grafana_data:
  backups:
  esphome_cache:
  esphome_build:
