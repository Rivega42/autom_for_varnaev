# Конфигурация Mosquitto (MQTT-брокер) для приёма показаний от узлов датчиков.
# Узлы (ESP32-C3, ESPHome) публикуют сами; сервер их не опрашивает.

# Слушатель MQTT. Порт публикуется на LAN объекта (узлы вне Docker).
listener 1883

# v1: без облака, доступ ограничен сетью объекта (LAN) и внутренней Docker-сетью.
# Аутентификация/ACL — отдельной задачей при ужесточении периметра.
allow_anonymous true

# Хранение сообщений/состояния между перезапусками.
persistence true
persistence_location /mosquitto/data/
