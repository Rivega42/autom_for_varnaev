# Каркас оркестрации контура мониторинга.
# Здесь — только база (db), сетевая сегментация и общий том. Прикладные сервисы
# (ingest-sensors, video-analytics, log-service, api-gateway, scheduler,
# media-gateway, grafana, mqtt-broker) добавляются своими задачами эпиков E2–E9.
#
# Сети (см. docs/02_NETWORK.md §3):
#   internal    — внутренняя сеть наших сервисов, наружу не видна;
#   integration — общая с АУРА; в v1 СОЗДАЁТСЯ, но обмена по ней нет (СТЫК-АУРА v2).
# Общий том:
#   artifacts   — скриншоты-доказательства (v1) и видеофайлы от АУРА (v2).

services:
  db:
    # TimescaleDB = PostgreSQL 16 + расширение timescaledb.
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      # Read-only пользователь для Grafana (создаётся init-скриптом 02_grafana_ro.sh).
      POSTGRES_RO_USER: ${POSTGRES_RO_USER:-grafana_ro}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD:?POSTGRES_RO_PASSWORD должен быть задан в .env}
    networks:
      - internal
    volumes:
      - db_data:/var/lib/postgresql/data
      # Init-скрипты выполняются при первой инициализации БД
      # (включение расширения timescaledb — задача E1.2).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitoring} -d ${POSTGRES_DB:-monitoring}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  migrate:
    # Применение миграций Alembic (one-shot) ДО старта прикладных сервисов.
    # Завершается после `alembic upgrade head`; зависимые сервисы ждут его
    # успешного завершения (service_completed_successfully) и стартуют на готовой
    # схеме. Без этого шага БД поднимается без прикладных таблиц и сервисы падают.
    build:
      context: .
      dockerfile: db/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    # Одноразовая задача: после успешного завершения не перезапускаем.
    restart: "no"

  seed:
    # Массовый сидинг справочников из YAML (one-shot, ТОЛЬКО под профилем "seed").
    # Не входит в дефолтный стек. Запускается явно ВНУТРИ сети контура (БД наружу
    # не публикуется). Альтернатива — завести справочники через GUI/REST.
    #   docker compose --profile seed run --rm seed            # dry-run (проверка)
    #   docker compose --profile seed run --rm seed --apply    # запись в БД
    profiles: ["seed"]
    build:
      context: .
      dockerfile: db/Dockerfile.seed
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
    networks:
      - internal
    volumes:
      # Конфиг объекта (rooms/sensor_nodes/cameras). Реальный object.yaml — не в репо;
      # см. db/seeds/object.example.yaml. ENTRYPOINT читает /seeds/object.yaml.
      - ./db/seeds:/seeds:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Одноразовая задача: после завершения не перезапускаем.
    restart: "no"

  backup:
    # Резервное копирование БД по расписанию с ротацией (#267). На объекте нет
    # администратора БД, а журнал санитарии/ППК терять нельзя. Делает сжатый
    # pg_dump в том `backups`, хранит BACKUP_KEEP последних, спит BACKUP_INTERVAL_H
    # часов. Сеть internal — БД наружу не публикуется. Восстановление: docs/09 §4.
    build:
      context: .
      dockerfile: db/Dockerfile.backup
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      BACKUP_DIR: /backups
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
      BACKUP_INTERVAL_H: ${BACKUP_INTERVAL_H:-24}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mqtt-broker:
    # Брокер MQTT (Mosquitto): приём показаний от узлов датчиков (ESPHome).
    image: eclipse-mosquitto:2
    networks:
      - internal
      # edge: публикуемый порт 1883 не работает из чисто internal-сети
      - edge
    ports:
      # публикация на LAN объекта — узлы датчиков вне Docker
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
    restart: unless-stopped

  media-gateway:
    # Медиа-шлюз камер (go2rtc): RTSP/ONVIF → воркер аналитики + превью WebRTC.
    image: alexxit/go2rtc:latest
    networks:
      - internal
      # edge: go2rtc должен дотягиваться до IP-камер в LAN объекта
      - edge
    volumes:
      - ./media-gateway/go2rtc.yaml:/config/go2rtc.yaml:ro
    restart: unless-stopped

  grafana:
    # Дашборды поверх TimescaleDB: ряды датчиков и лента событий (эпик E7).
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD должен быть задан в .env}
      # Передаются в provisioning datasource (timescaledb.yaml) через ${VAR}.
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_RO_USER: ${POSTGRES_RO_USER:-grafana_ro}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD:?POSTGRES_RO_PASSWORD должен быть задан в .env}
    networks:
      - internal
      # edge: публикуемый порт 3000 не работает из чисто internal-сети
      - edge
    ports:
      # дашборд публикуется на хост (единственный наружу, кроме api-gateway)
      - "3000:3000"
    volumes:
      # provisioning и дашборды как код (datasource/дашборды — задачи E7.2–E7.5)
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  log-service:
    # Единый журнал событий: приём от ingest/analytics, чтение по REST (внутр.).
    build:
      context: .
      dockerfile: services/log-service/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      # Уведомления (#264): каналы включаются заданием соответствующих переменных.
      NOTIFY_MIN_SEVERITY: ${NOTIFY_MIN_SEVERITY:-warning}
      NOTIFY_TYPES: ${NOTIFY_TYPES:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      NOTIFY_EMAIL_FROM: ${NOTIFY_EMAIL_FROM:-}
      NOTIFY_EMAIL_TO: ${NOTIFY_EMAIL_TO:-}
      NOTIFY_ESCALATE_AFTER_MIN: ${NOTIFY_ESCALATE_AFTER_MIN:-0}
      NOTIFY_ESCALATE_REPEAT_MIN: ${NOTIFY_ESCALATE_REPEAT_MIN:-30}
      NOTIFY_ESCALATE_MAX: ${NOTIFY_ESCALATE_MAX:-3}
      NOTIFY_ESCALATE_SEVERITIES: ${NOTIFY_ESCALATE_SEVERITIES:-critical}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
      # edge: исходящие уведомления (Telegram/SMTP/webhook) наружу из internal не уйдут
      - edge
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api-gateway:
    # Единственный внешний REST-вход контура; разъёмы АУРА заглушены в v1.
    # Включён в ОБЕ сети (internal + integration) — мост к АУРА (обмена нет в v1).
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      API_KEY: ${API_KEY:?API_KEY должен быть задан в .env (иначе API открыт без ключа)}
      AURA_INTEGRATION_ENABLED: ${AURA_INTEGRATION_ENABLED:-false}
      # Кадр-превью камеры для GUI разметки ROI (go2rtc во внутренней сети).
      GO2RTC_URL: ${GO2RTC_URL:-http://media-gateway:1984}
      # Подключение к БД (справочники, задания, показания читаются напрямую).
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      # Каталог артефактов (общий том со воркером): отдаём стоп-кадры в Grafana
      # и складываем снимки браузерного живого анализа.
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
    networks:
      - internal
      - integration
      # edge: публикуемый порт 8000 не должен зависеть от сети integration
      - edge
    ports:
      # единственный (кроме Grafana) опубликованный наружу REST-вход
      - "8000:8000"
    volumes:
      # Общий том артефактов: чтение (отдача наружу) и запись (снимки из браузера).
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  ingest-sensors:
    # Воркер приёма показаний по MQTT и записи в БД (внутр., без порта наружу).
    build:
      context: .
      dockerfile: services/ingest-sensors/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      MQTT_HOST: ${MQTT_HOST:-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-monitoring}
      # Учётные данные брокера (если Mosquitto настроен с авторизацией).
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      # Порог «тишины» узла (мин): нет показаний дольше — событие sensor_silent.
      SENSOR_SILENT_MIN: ${SENSOR_SILENT_MIN:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mqtt-broker:
        condition: service_started
    restart: unless-stopped

  scheduler:
    # Демон планировщика: создаёт задания на анализ по расписаниям (внутр.).
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      SCHEDULER_CONFIG: ${SCHEDULER_CONFIG:-/config/schedules.json}
      # Журнал событий: cleaning_overdue контроля уборки (#265), живость камер (#283).
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      # Медиа-шлюз: проба живости камер (#283).
      GO2RTC_URL: ${GO2RTC_URL:-http://media-gateway:1984}
      SCHEDULER_TICK_S: ${SCHEDULER_TICK_S:-60}
      # Watchdog сервисов (#284): порог «тишины» heartbeat'а, минут.
      SERVICE_SILENT_MIN: ${SERVICE_SILENT_MIN:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    volumes:
      # Расписания планировщика. Файла schedules.json может не быть —
      # тогда заданий не создаётся (см. config/README.md).
      - ./config:/config:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        # healthy: первые cleaning_overdue не должны теряться на старте стека
        condition: service_healthy
    restart: unless-stopped

  video-analytics:
    # Воркер видеоаналитики: задания из очереди → события в log-service (внутр.).
    build:
      context: .
      dockerfile: services/video-analytics/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
      ANALYTICS_FPS: ${ANALYTICS_FPS:-5}
      ANALYTICS_MODEL_PATH: ${ANALYTICS_MODEL_PATH:-/models/pose_landmarker.task}
      ANALYTICS_MAX_STREAM_FRAMES: ${ANALYTICS_MAX_STREAM_FRAMES:-150}
      # Ротация артефактов: скриншоты старше N дней удаляются (0 = выключено).
      ARTIFACTS_RETENTION_DAYS: ${ARTIFACTS_RETENTION_DAYS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    volumes:
      - artifacts:/data/artifacts
      # Модель MediaPipe PoseLandmarker — бинарный ассет; положить в ./models
      # (см. models/README.md). Без модели воркер не стартует.
      - ./models:/models:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        condition: service_started
      media-gateway:
        condition: service_started
    restart: unless-stopped

  # ── Профиль release (E9.7): закрытые сборки через Nuitka ──
  # dev-сервисы выше работают ПО УМОЛЧАНИЮ. Release-варианты ниже поднимаются
  # ТОЛЬКО под профилем release (не дефолт), прежде всего для СБОРКИ закрытых
  # образов:  docker compose --profile release build
  # Не запускайте release-вариант одновременно с его dev-двойником (один порт).
  api-gateway-release:
    profiles: ["release"]
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile.release
    environment:
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      API_KEY: ${API_KEY:?API_KEY должен быть задан в .env (иначе API открыт без ключа)}
      AURA_INTEGRATION_ENABLED: ${AURA_INTEGRATION_ENABLED:-false}
      GO2RTC_URL: ${GO2RTC_URL:-http://media-gateway:1984}
      # Подключение к БД (справочники, задания, показания читаются напрямую).
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      # Каталог артефактов (как у dev api-gateway): отдача стоп-кадров в Grafana.
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
    networks:
      - internal
      - integration
      # edge: публикуемый порт 8000 не должен зависеть от сети integration
      - edge
    ports:
      - "8000:8000"
    volumes:
      # Общий том артефактов: чтение (отдача наружу) и запись (снимки из браузера).
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        condition: service_healthy
    # healthcheck не задаём: distroless-образ без python и шелла.
    restart: unless-stopped

  video-analytics-release:
    profiles: ["release"]
    build:
      context: .
      dockerfile: services/video-analytics/Dockerfile.release
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD должен быть задан в .env}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8000}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
      ANALYTICS_FPS: ${ANALYTICS_FPS:-5}
      ANALYTICS_MODEL_PATH: ${ANALYTICS_MODEL_PATH:-/models/pose_landmarker.task}
      ANALYTICS_MAX_STREAM_FRAMES: ${ANALYTICS_MAX_STREAM_FRAMES:-150}
      ARTIFACTS_RETENTION_DAYS: ${ARTIFACTS_RETENTION_DAYS:-30}
    networks:
      - internal
    volumes:
      - artifacts:/data/artifacts
      - ./models:/models:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      log-service:
        # healthy, а не started: иначе первые события воркера тихо теряются,
        # пока uvicorn log-service ещё не принимает соединения.
        condition: service_healthy
      media-gateway:
        condition: service_started
    restart: unless-stopped

networks:
  # internal: true — реальная изоляция (docs/02_NETWORK.md): из этой сети нет
  # выхода наружу и published-порты сервисов, висящих ТОЛЬКО в ней, не работают.
  # Поэтому сервисы, которым нужен LAN объекта (камеры, узлы датчиков) или
  # публикация порта на хост, дополнительно включены в сеть edge.
  internal:
    driver: bridge
    internal: true
  edge:
    driver: bridge
  integration:
    driver: bridge

volumes:
  artifacts:
  db_data:
  mqtt_data:
  grafana_data:
  backups:  # сжатые дампы БД (сервис backup, #267)
