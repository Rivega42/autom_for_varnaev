<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 660" font-family="'Segoe UI', 'PT Sans', Arial, sans-serif">
  <defs>
    <style>
      .t{fill:#1f2a36;}
      .muted{fill:#5b6b7a;}
      .mcu{fill:#e8eef9;stroke:#3d5266;stroke-width:1.6;}
      .i2c{fill:#e8f5ee;stroke:#54a777;stroke-width:1.6;}
      .ana{fill:#fff6e6;stroke:#d8a23a;stroke-width:1.6;}
      .h{font-size:15px;font-weight:700;}
      .lbl{font-size:13px;}
      .lbl-s{font-size:11px;}
      .pin{font-size:11px;font-weight:600;}
      .w-vcc{stroke:#e0584f;stroke-width:2.4;fill:none;}
      .w-gnd{stroke:#3a4250;stroke-width:2.4;fill:none;}
      .w-sda{stroke:#2e9b6b;stroke-width:2.4;fill:none;}
      .w-scl{stroke:#3367d6;stroke-width:2.4;fill:none;}
      .w-adc{stroke:#9b6dc4;stroke-width:2.4;fill:none;}
    </style>
  </defs>

  <text x="24" y="34" class="t h" font-size="18">08 · Расключение узла датчиков</text>
  <text x="24" y="55" class="muted lbl">ESP32-C3 + SHT4x / MLX90614 / LTR390 на общей шине I²C; GUVC-S10GD — аналог. Источник: firmware/esphome/node.example.yaml</text>

  <!-- I2C sensors (top row) -->
  <g>
    <rect x="250" y="92" width="170" height="74" rx="9" class="i2c"/>
    <text x="335" y="120" class="t h" text-anchor="middle">SHT41 / SHT40</text>
    <text x="335" y="140" class="muted lbl-s" text-anchor="middle">воздух: t° + влажность</text>
    <text x="335" y="156" class="muted lbl-s" text-anchor="middle">I²C 0x44</text>

    <rect x="455" y="92" width="170" height="74" rx="9" class="i2c"/>
    <text x="540" y="120" class="t h" text-anchor="middle">MLX90614</text>
    <text x="540" y="140" class="muted lbl-s" text-anchor="middle">ИК t° поверхности</text>
    <text x="540" y="156" class="muted lbl-s" text-anchor="middle">I²C 0x5A</text>

    <rect x="660" y="92" width="170" height="74" rx="9" class="i2c"/>
    <text x="745" y="120" class="t h" text-anchor="middle">LTR390</text>
    <text x="745" y="140" class="muted lbl-s" text-anchor="middle">УФ-индекс / УФ-A</text>
    <text x="745" y="156" class="muted lbl-s" text-anchor="middle">I²C 0x53</text>
  </g>

  <!-- MCU -->
  <rect x="40" y="250" width="170" height="230" rx="10" class="mcu"/>
  <text x="125" y="284" class="t h" text-anchor="middle">ESP32-C3</text>
  <text x="125" y="303" class="muted lbl-s" text-anchor="middle">SuperMini</text>
  <text x="125" y="322" class="muted lbl-s" text-anchor="middle">Wi-Fi · USB-C</text>
  <!-- pin labels inside, aligned to rails -->
  <text x="200" y="334" class="pin" text-anchor="end" fill="#e0584f">3V3</text>
  <text x="200" y="374" class="pin" text-anchor="end" fill="#3a4250">GND</text>
  <text x="200" y="414" class="pin" text-anchor="end" fill="#2e9b6b">GPIO5 · SDA</text>
  <text x="200" y="446" class="pin" text-anchor="end" fill="#3367d6">GPIO6 · SCL</text>
  <text x="200" y="476" class="pin" text-anchor="end" fill="#9b6dc4">GPIO3 · ADC</text>

  <!-- Bus rails -->
  <line x1="210" y1="330" x2="880" y2="330" class="w-vcc"/>
  <line x1="210" y1="370" x2="880" y2="370" class="w-gnd"/>
  <line x1="210" y1="410" x2="640" y2="410" class="w-sda"/>
  <line x1="210" y1="442" x2="640" y2="442" class="w-scl"/>
  <text x="888" y="334" class="pin" fill="#e0584f">3V3</text>
  <text x="888" y="374" class="pin" fill="#3a4250">GND</text>
  <text x="648" y="414" class="pin" fill="#2e9b6b">SDA</text>
  <text x="648" y="446" class="pin" fill="#3367d6">SCL</text>

  <!-- Drops: SHT4x (box 250..420), inner x 275/305/335/365 -->
  <line x1="275" y1="166" x2="275" y2="330" class="w-vcc"/>
  <line x1="305" y1="166" x2="305" y2="370" class="w-gnd"/>
  <line x1="335" y1="166" x2="335" y2="410" class="w-sda"/>
  <line x1="365" y1="166" x2="365" y2="442" class="w-scl"/>
  <circle cx="275" cy="330" r="3.4" fill="#e0584f"/>
  <circle cx="305" cy="370" r="3.4" fill="#3a4250"/>
  <circle cx="335" cy="410" r="3.4" fill="#2e9b6b"/>
  <circle cx="365" cy="442" r="3.4" fill="#3367d6"/>

  <!-- Drops: MLX90614 (box 455..625), inner x 480/510/540/570 -->
  <line x1="480" y1="166" x2="480" y2="330" class="w-vcc"/>
  <line x1="510" y1="166" x2="510" y2="370" class="w-gnd"/>
  <line x1="540" y1="166" x2="540" y2="410" class="w-sda"/>
  <line x1="570" y1="166" x2="570" y2="442" class="w-scl"/>
  <circle cx="480" cy="330" r="3.4" fill="#e0584f"/>
  <circle cx="510" cy="370" r="3.4" fill="#3a4250"/>
  <circle cx="540" cy="410" r="3.4" fill="#2e9b6b"/>
  <circle cx="570" cy="442" r="3.4" fill="#3367d6"/>

  <!-- Drops: LTR390 (box 660..830), inner x 685/715/745/775 — SDA/SCL bend left to rail end 640 -->
  <line x1="685" y1="166" x2="685" y2="330" class="w-vcc"/>
  <line x1="715" y1="166" x2="715" y2="370" class="w-gnd"/>
  <polyline points="745,166 745,410 640,410" class="w-sda"/>
  <polyline points="775,166 775,442 640,442" class="w-scl"/>
  <circle cx="685" cy="330" r="3.4" fill="#e0584f"/>
  <circle cx="715" cy="370" r="3.4" fill="#3a4250"/>
  <circle cx="640" cy="410" r="3.4" fill="#2e9b6b"/>
  <circle cx="640" cy="442" r="3.4" fill="#3367d6"/>

  <!-- Analog UV-C sensor (bottom) -->
  <rect x="250" y="540" width="240" height="78" rx="9" class="ana"/>
  <text x="370" y="568" class="t h" text-anchor="middle">GUVC-S10GD + усилитель</text>
  <text x="370" y="588" class="muted lbl-s" text-anchor="middle">УФ-C 254 нм (аналоговый выход)</text>
  <text x="370" y="604" class="muted lbl-s" text-anchor="middle">контроль кварцевых ламп (ППК)</text>
  <!-- ADC stub from MCU -->
  <line x1="210" y1="472" x2="290" y2="472" class="w-adc"/>
  <!-- signal: ADC pin -> sensor top -->
  <polyline points="290,472 290,540" class="w-adc"/>
  <circle cx="290" cy="540" r="3.4" fill="#9b6dc4"/>
  <!-- VCC tap to 3V3 rail -->
  <polyline points="340,540 340,330" class="w-vcc"/>
  <circle cx="340" cy="330" r="3.4" fill="#e0584f"/>
  <!-- GND tap to GND rail -->
  <polyline points="390,540 390,370" class="w-gnd"/>
  <circle cx="390" cy="370" r="3.4" fill="#3a4250"/>
  <text x="252" y="532" class="lbl-s muted">сигнал→ADC · 3V3 · GND</text>

  <!-- Legend -->
  <g>
    <text x="560" y="540" class="t lbl" font-weight="700">Провода</text>
    <line x1="560" y1="556" x2="592" y2="556" class="w-vcc"/><text x="600" y="560" class="muted lbl-s">3V3 — питание</text>
    <line x1="560" y1="576" x2="592" y2="576" class="w-gnd"/><text x="600" y="580" class="muted lbl-s">GND — земля</text>
    <line x1="560" y1="596" x2="592" y2="596" class="w-sda"/><text x="600" y="600" class="muted lbl-s">SDA — данные I²C</text>
    <line x1="740" y1="556" x2="772" y2="556" class="w-scl"/><text x="780" y="560" class="muted lbl-s">SCL — такт I²C</text>
    <line x1="740" y1="576" x2="772" y2="576" class="w-adc"/><text x="780" y="580" class="muted lbl-s">ADC — аналог УФ-C</text>
    <text x="740" y="600" class="muted lbl-s">точка ● = соединение</text>
  </g>
</svg>
