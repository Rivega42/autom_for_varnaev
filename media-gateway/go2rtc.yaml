# go2rtc — медиа-шлюз камер.
# Принимает RTSP/ONVIF с камер, раздаёт поток воркеру video-analytics и превью
# в браузер по WebRTC; снимает проблему CORS дешёвых камер (нет
# Access-Control-Allow-Origin). Реальные URL камер берутся из справочника
# cameras (БД) / секретов; здесь — пример без реальных адресов.

api:
  listen: ":1984"

streams:
  # Пример потока помещения (заменить на реальные адреса при развёртывании).
  cam-01: rtsp://camera.local:554/stream
