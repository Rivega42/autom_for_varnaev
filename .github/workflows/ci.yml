name: CI

# Прогон линта, типов и тестов на каждый PR и на push в main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-type-test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Установка зависимостей
        run: pip install -r requirements-dev.txt

      - name: ruff (линт)
        run: ruff check .

      - name: ruff (формат)
        run: ruff format --check .

      - name: mypy (типы)
        run: mypy .

      - name: pytest (тесты)
        run: pytest

  node-test:
    name: node --test (analysis-core)
    runs-on: ubuntu-latest
    # Прогон Node-тестов единого ядра видеоаналитики (analysis-core) и серверного
    # конвейера (video-analytics-node). Каталоги проверяются по наличию, поэтому
    # один и тот же workflow работает и до, и после появления Node-сервисов.
    steps:
      - uses: actions/checkout@v4

      - name: Установка Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Node-тесты JS-сервисов
        run: |
          for d in services/analysis-core services/video-analytics-node; do
            if [ -d "$d" ]; then
              echo "::group::node --test ($d)"
              (cd "$d" && node --test)
              echo "::endgroup::"
            fi
          done

  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    # Валидация compose-файлов (синтаксис, ссылки на сети/тома, интерполяция env):
    # битая топология должна ловиться в CI, а не при `up` на объекте.
    steps:
      - uses: actions/checkout@v4

      - name: Валидация базового compose
        run: docker compose --env-file .env.example -f docker-compose.yml config -q

      - name: Валидация связки с demo-оверлеем
        run: >
          docker compose --env-file .env.example
          -f docker-compose.yml -f docker-compose.demo.yml config -q

  docker-build:
    name: docker smoke-build
    runs-on: ubuntu-latest
    # Собираем образ каждого сервиса (без публикации) — ловим ломающиеся Dockerfile
    # до мёрджа. Контекст сборки — корень репозитория (нужен пакет shared).
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, log-service, ingest-sensors, scheduler, video-analytics, demo-sensors]
    steps:
      - uses: actions/checkout@v4

      - name: Настройка Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка образа ${{ matrix.service }} (без публикации)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
