name: CI

# Прогон линта, типов и тестов на каждый PR и на push в main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-type-test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Установка зависимостей
        run: pip install -r requirements-dev.txt

      - name: ruff (линт)
        run: ruff check .

      - name: ruff (формат)
        run: ruff format --check .

      - name: mypy (типы)
        run: mypy .

      - name: pytest (тесты)
        run: pytest

  docker-build:
    name: docker smoke-build
    runs-on: ubuntu-latest
    # Собираем образ каждого сервиса (без публикации) — ловим ломающиеся Dockerfile
    # до мёрджа. Контекст сборки — корень репозитория (нужен пакет shared).
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, log-service, ingest-sensors, scheduler, video-analytics, demo-sensors]
    steps:
      - uses: actions/checkout@v4

      - name: Настройка Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка образа ${{ matrix.service }} (без публикации)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
