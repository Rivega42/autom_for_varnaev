# Пример конфигурации объекта для сидов справочников.
# Реальный конфиг (адреса камер и т.п.) кладётся рядом как object.yaml (не в репо).
rooms:
  - id: room-01
    name: "Помещение для приготовления пищи"
    is_cold: false
  - id: room-02
    name: "Холодильная камера"
    is_cold: true

sensor_nodes:
  - id: node-01
    room_id: room-01
    placement: "внутри (I2C)"
    power: mains
  - id: node-02
    room_id: room-02
    placement: "снаружи камеры (радио), датчики внутри на I2C-шлейфе"
    power: mains

cameras:
  - id: "11111111-1111-1111-1111-111111111111"
    room_id: room-01
    name: cam-01
    rtsp_url: "rtsp://camera.local/stream"
    enabled: true

# Пороги датчиков (критерии событий). room не указан = глобальный порог.
# op: ">" | "<" | ">=" | "<"; severity: info | warning | critical.
# silent_min (необяз.) — порог «тишины» узла в минутах (событие sensor_silent).
thresholds:
  - metric: humidity
    op: ">"
    value: 70.0
    severity: warning
  - room: room-02
    metric: air_temp
    op: ">"
    value: 8.0
    severity: critical
    silent_min: 10
