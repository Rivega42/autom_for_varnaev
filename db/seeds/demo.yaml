# Демо-конфигурация стенда для демо-режима (docker-compose.demo.yml).
# В отличие от db/seeds/object.yaml этот файл КОММИТИТСЯ в репозиторий: это
# синтетический стенд без реальных адресов камер и узлов. Узлы здесь должны
# совпадать с теми, что публикует demo-sensors (services/demo-sensors).
rooms:
  - id: room-01
    name: "Помещение для приготовления пищи"
    is_cold: false
  - id: room-02
    name: "Холодильная камера"
    is_cold: true

sensor_nodes:
  - id: node-01
    room_id: room-01
    placement: "внутри (I2C)"
    power: mains
  - id: node-02
    room_id: room-02
    placement: "внутри камеры (I2C-шлейф)"
    power: mains

# Камер в демо нет: видеоаналитика в демо-режиме не запускается (нет модели).
cameras: []

# Демо-пороги: подобраны под «всплески» генератора demo-sensors, чтобы в журнале
# периодически появлялись события (влажность > 70%, темп. в холодильной > 8 °C).
thresholds:
  - metric: humidity
    op: ">"
    value: 70.0
    severity: warning
  - room: room-02
    metric: air_temp
    op: ">"
    value: 8.0
    severity: critical
