<!DOCTYPE html>
<!--
  Дашборд «Стена роликов» (#wall): сетка роликов-«камер» по 2 слева + лента
  событий со скриншотами справа во всю высоту. Клик по ролику → разметка ROI
  (зона стола) и тумблеры (что распознавать: халат/протирание/покрытие), кнопка
  «Анализировать» создаёт file-задание серверному воркеру (полный пайплайн).
  Ключ X-API-Key — общий с остальным GUI: localStorage["apiKey"].
-->
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Стена роликов — видеоаналитика</title>
  <style>
    :root {
      --bg: #0b0f0c; --panel: #11160f; --line: #1e2a1c; --fg: #d7f5cf;
      --muted: #7fae74; --accent: #46d160; --warn: #e0b400; --crit: #ff5a4d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 14px/1.4 "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
    }
    header {
      display: flex; align-items: center; gap: 12px; padding: 8px 14px;
      border-bottom: 1px solid var(--line); background: var(--panel);
      position: sticky; top: 0; z-index: 5;
    }
    header h1 { font-size: 15px; margin: 0; color: var(--accent); }
    header .grow { flex: 1; }
    header a { color: var(--muted); text-decoration: none; font-size: 13px; }
    header a:hover { color: var(--fg); }
    input[type=password], input[type=text] {
      background: #0a0d08; color: var(--fg); border: 1px solid var(--line);
      border-radius: 6px; padding: 5px 8px;
    }
    button {
      background: #16210f; color: var(--fg); border: 1px solid var(--line);
      border-radius: 6px; padding: 5px 10px; cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: #18351c; border-color: var(--accent); color: var(--accent); }
    button.on { background: #18351c; border-color: var(--accent); color: var(--accent); }

    .wall { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 49px); }
    .clips { overflow-y: auto; padding: 12px; }
    .clip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 1100px) { .clip-grid { grid-template-columns: 1fr; } }

    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    .card h3 { margin: 0; padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--line); }
    .stage { position: relative; background: #000; }
    .stage video { display: block; width: 100%; height: auto; }
    .stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }
    .stage canvas.idle { pointer-events: none; }
    .tools { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; align-items: center; }
    .tools .sep { flex: 1; }
    .status { padding: 0 8px 8px; font-size: 12px; color: var(--muted); min-height: 16px; }

    .feed { border-left: 1px solid var(--line); background: var(--panel); overflow-y: auto; }
    .feed h2 { font-size: 13px; margin: 0; padding: 10px 12px; position: sticky; top: 0;
      background: var(--panel); border-bottom: 1px solid var(--line); color: var(--accent); }
    .ev { padding: 8px 12px; border-bottom: 1px solid var(--line); }
    .ev .row { display: flex; gap: 8px; align-items: baseline; }
    .ev time { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .ev .sev { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--line); text-transform: uppercase; }
    .ev .sev.warning { color: var(--warn); border-color: var(--warn); }
    .ev .sev.critical { color: var(--crit); border-color: var(--crit); }
    .ev .sev.info { color: var(--muted); }
    .ev .msg { margin-top: 3px; }
    .ev img { margin-top: 6px; max-width: 100%; border-radius: 6px; border: 1px solid var(--line); cursor: zoom-in; }
    .ev .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .hint { color: var(--muted); font-size: 12px; padding: 10px 12px; }
  </style>
</head>
<body>
  <header>
    <h1>⬛ Стена роликов</h1>
    <a href="/ui/overview.html">Дежурный</a>
    <a href="/ui/">Настройки</a>
    <a href="http://localhost:3000" target="_blank">Grafana</a>
    <span class="grow"></span>
    <input id="uploadInput" type="file" accept="video/*" style="display:none" />
    <button id="uploadBtn">⬆ Загрузить ролик</button>
    <button id="reload">⟳ Обновить ролики</button>
    <input id="apikey" type="password" placeholder="X-API-Key" autocomplete="off" />
  </header>

  <div class="wall">
    <section class="clips">
      <div id="clipGrid" class="clip-grid"></div>
      <div id="clipsHint" class="hint"></div>
    </section>
    <aside class="feed">
      <h2>Лента событий</h2>
      <div id="feedList"></div>
    </aside>
  </div>

  <script type="module" src="/ui/wall.js"></script>
</body>
</html>
